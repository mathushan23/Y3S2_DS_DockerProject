spring.application.name=gateway
server.port=${SERVER_PORT:8080}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=patient-service
spring.cloud.gateway.routes[1].uri=${PATIENT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/patients/**

spring.cloud.gateway.routes[2].id=doctor-service
spring.cloud.gateway.routes[2].uri=${DOCTOR_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/doctors/**

spring.cloud.gateway.routes[3].id=appointment-service
spring.cloud.gateway.routes[3].uri=${APPOINTMENT_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/appointments/**

spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=${PAYMENT_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=${NOTIFICATION_SERVICE_URL:http://localhost:8086}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[6].id=ai-symptom-checker-service
spring.cloud.gateway.routes[6].uri=${AI_SYMPTOM_CHECKER_SERVICE_URL:http://localhost:8087}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/symptoms/**

spring.cloud.gateway.routes[7].id=telemedicine-service
spring.cloud.gateway.routes[7].uri=${TELEMEDICINE_SERVICE_URL:http://localhost:8088}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/telemedicine/**

spring.cloud.gateway.routes[8].id=admin-service
spring.cloud.gateway.routes[8].uri=${ADMIN_SERVICE_URL:http://localhost:8089}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

management.endpoints.web.exposure.include=health,info