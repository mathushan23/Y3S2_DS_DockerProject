spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${DB_NAME:auth_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,info
 
# JWT Configuration
jwt.secret=9a4f4e35456456f4d56f4d56f4d56f4d56f4d56f4d56f4d56f4d56f4d56f4d56
jwt.expiration=86400000

# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:your_account_sid}
twilio.auth.token=${TWILIO_AUTH_TOKEN:your_auth_token}
twilio.phone.number=${TWILIO_PHONE_NUMBER:your_twilio_phone_number}
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID:your_verify_service_id}
