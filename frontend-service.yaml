apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: healthcare
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30090
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: healthcare-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
