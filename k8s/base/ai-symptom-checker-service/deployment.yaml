apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-checker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-checker-service
  template:
    metadata:
      labels:
        app: ai-symptom-checker-service
    spec:
      containers:
        - name: ai-symptom-checker-service
          image: healthcare/ai-symptom-checker-service:latest
          ports:
            - containerPort: 8087
          env:
            - name: SERVER_PORT
              value: "8087"
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: MYSQL_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: AI_SYMPTOM_CHECKER_DB
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthcare-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-secret
                  key: MYSQL_PASSWORD
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: PATIENT_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: DOCTOR_SERVICE_URL
