apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: healthcare
spec:
  selector:
    app: notification-service
  ports:
  - port: 8086
    targetPort: 8086
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: healthcare-notification-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/notification_db?useSSL=false&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "healthcare_user"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "healthcare_pass"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
